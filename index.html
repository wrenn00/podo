<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포도 두더지</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { height: 100%; }

    body {
      width: 100%; min-height: 100%;
      background: #fafafa;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-weight: 600;
      transition: background 0.5s;
    }

    body.hard   { background: #f0f0f0; }
    body.insane { background: #ececec; }
    body.master { background: #ececec; }

    /* vignette for PODO MASTER */
    body.master::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(180,0,0,0.12) 100%);
      pointer-events: none;
      z-index: 1;
    }

    @media (hover: hover) { body { cursor: none; } }

    /* ── hand cursor ── */
    #hand {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 48px;
      line-height: 1;
      transform: translate(-50%, -50%);
      user-select: none;
    }
    #hand.wiggling { animation: hand-wiggle 0.25s ease-in-out infinite alternate; }
    @keyframes hand-wiggle {
      from { transform: translate(-50%, -50%) rotate(-5deg); }
      to   { transform: translate(-50%, -50%) rotate(5deg); }
    }
    @media (hover: none) { #hand { display: none; } }

    /* ── HUD ── */
    #hud-left, #hud-right {
      position: fixed;
      top: 28px;
      line-height: 1;
      pointer-events: none;
      z-index: 10;
    }
    #hud-left  { left: 40px; }
    #hud-right { right: 40px; text-align: right; }

    .hud-big {
      font-size: 48px;
      font-weight: 800;
      color: #000;
      transition: color 0.3s;
    }
    .hud-big.danger { color: #ff3333; }

    .hud-small {
      font-size: 18px;
      font-weight: 500;
      color: #888;
      margin-top: 4px;
    }

    /* ── grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 240px);
      grid-template-rows: repeat(3, 280px);
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .hole-container {
      position: relative;
      width: 240px;
      height: 280px;
      overflow: hidden;
    }

    .podo {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 240px;
      height: auto;
      transform: translate(-50%, 100%);
      transition: transform 0.2s ease-in;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 1;
    }

    .podo.up {
      transform: translate(-50%, 0%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }

    .podo.patted {
      animation: patted 0.35s ease forwards !important;
      pointer-events: none;
    }
    @keyframes patted {
      0%   { transform: translateX(-50%) scale(1, 1); }
      30%  { transform: translateX(-50%) translateY(2%) scale(1.05, 0.92); }
      60%  { transform: translateX(-50%) translateY(-2%) scale(0.97, 1.05); }
      100% { transform: translateX(-50%) scale(1, 1); }
    }

    .podo.angry {
      animation: angry 0.3s ease forwards !important;
      pointer-events: none;
    }
    @keyframes angry {
      0%,100% { transform: translateX(-50%) rotate(0deg); }
      20%     { transform: translateX(-52%) rotate(-3deg); }
      40%     { transform: translateX(-48%) rotate(3deg); }
      60%     { transform: translateX(-52%) rotate(-3deg); }
      80%     { transform: translateX(-48%) rotate(3deg); }
    }

    .hole {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 45px;
      background: #1a1a1a;
      border-radius: 50%;
      box-shadow: inset 0 6px 10px rgba(0,0,0,0.6), 0 2px 0 #111;
      z-index: 2;
      pointer-events: none;
    }

    /* ── screen shake ── */
    @keyframes shake {
      0%   { transform: translate(0,0); }
      18%  { transform: translate(-6px, 2px); }
      36%  { transform: translate(5px, -3px); }
      54%  { transform: translate(-4px, 3px); }
      72%  { transform: translate(4px, -1px); }
      100% { transform: translate(0,0); }
    }
    body.shake { animation: shake 0.3s ease; }

    /* ── impact ring ── */
    .ring {
      position: fixed;
      border: 2px solid rgba(0,0,0,0.18);
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -50%);
    }

    /* ── red flash ── */
    #redflash {
      position: fixed;
      inset: 0;
      background: rgba(255,0,0,0.2);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }
    #redflash.flash { animation: redflash-anim 0.2s ease forwards; }
    @keyframes redflash-anim { 0% { opacity:1; } 100% { opacity:0; } }

    /* ── splash (countdown / round clear) ── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.1s;
      gap: 12px;
    }
    #splash.show { opacity: 1; }
    #splash .sp-main {
      font-size: 96px;
      font-weight: 400;
      color: #000;
      line-height: 1;
    }
    #splash .sp-sub {
      font-size: 24px;
      color: #555;
    }

    /* ── title screen ── */
    #titlescreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      z-index: 400;
      gap: 16px;
      cursor: pointer;
    }
    #titlescreen.hidden { display: none; }
    #titlescreen .ts-title {
      font-size: 60px;
      font-weight: 800;
      color: #000;
      line-height: 1;
    }
    #titlescreen .ts-sub {
      font-size: 18px;
      font-weight: 500;
      color: #888;
    }
    #titlescreen .ts-cta {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
      color: #bbb;
    }

    /* ── overlay (game over / clear) ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.70);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 0;
    }
    #overlay.show { display: flex; }
    #overlay .ov-title {
      font-size: 60px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      margin-bottom: 20px;
    }
    #overlay .ov-line1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      line-height: 1.8;
    }
    #overlay .ov-line2 {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
    }

    /* ── responsive ── */
    @media (max-width: 800px), (max-height: 900px) {
      .hole-container { width: 180px; height: 210px; }
      .podo { width: 180px; }
      .hole { width: 135px; height: 35px; }
      #grid {
        grid-template-columns: repeat(3, 180px);
        grid-template-rows: repeat(3, 210px);
        gap: 8px;
      }
    }
    @media (max-width: 600px) {
      .hole-container { width: 130px; height: 155px; }
      .podo { width: 130px; }
      .hole { width: 100px; height: 25px; }
      #grid {
        grid-template-columns: repeat(3, 130px);
        grid-template-rows: repeat(3, 155px);
        gap: 6px;
      }
    }
  </style>
</head>
<body>

  <div id="redflash"></div>
  <div id="splash"><span class="sp-main" id="spMain"></span><span class="sp-sub" id="spSub"></span></div>
  <div id="hand">🫳</div>

  <div id="hud-left">
    <div class="hud-big" id="hudScore">0 / 15</div>
    <div class="hud-small" id="hudRoundName">EASY</div>
  </div>
  <div id="hud-right">
    <div class="hud-big" id="hudRound">1 / 5</div>
    <div class="hud-small">라운드</div>
  </div>

  <div id="overlay">
    <div class="ov-title" id="ovTitle">끝</div>
    <div class="ov-line1" id="ovLine1"></div>
    <div class="ov-line2" id="ovLine2"></div>
  </div>

  <div id="titlescreen">
    <div class="ts-title">포도 두더지</div>
    <div class="ts-sub">다섯 라운드를 모두 깨보세요</div>
    <div class="ts-cta">클릭해서 시작</div>
  </div>

  <div id="grid">
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
  </div>

  <script>
    // ── rounds config ─────────────────────────────────────────
    const ROUNDS = [
      { name: '쉬움',        target: 15, spawnInterval: 1000, stayTime: 1400, fakeRatio: 0.15, simultaneous: 1   },
      { name: '보통',        target: 20, spawnInterval: 800,  stayTime: 1100, fakeRatio: 0.25, simultaneous: 1.3 },
      { name: '어려움',      target: 25, spawnInterval: 600,  stayTime: 900,  fakeRatio: 0.30, simultaneous: 2   },
      { name: '미친',        target: 30, spawnInterval: 450,  stayTime: 700,  fakeRatio: 0.35, simultaneous: 2.5 },
      { name: '포도 마스터', target: 35, spawnInterval: 300,  stayTime: 500,  fakeRatio: 0.40, simultaneous: 3   },
    ];

    // ── DOM ───────────────────────────────────────────────────
    const podos       = Array.from(document.querySelectorAll('.podo'));
    const hand        = document.getElementById('hand');
    const redflash    = document.getElementById('redflash');
    const splash      = document.getElementById('splash');
    const spMain      = document.getElementById('spMain');
    const spSub       = document.getElementById('spSub');
    const hudScore    = document.getElementById('hudScore');
    const hudRoundName= document.getElementById('hudRoundName');
    const hudRound    = document.getElementById('hudRound');
    const overlay     = document.getElementById('overlay');
    const ovTitle     = document.getElementById('ovTitle');
    const ovLine1     = document.getElementById('ovLine1');
    const ovLine2     = document.getElementById('ovLine2');
    const titlescreen = document.getElementById('titlescreen');

    // ── state ─────────────────────────────────────────────────
    let currentRound = 0;
    let roundScore   = 0;
    let running      = false;
    let spawnId      = null;
    let startTime    = 0;
    const retractTimers = new WeakMap();

    // ── audio ─────────────────────────────────────────────────
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    function resumeAc() { if (ac.state === 'suspended') ac.resume(); }

    function playTuk() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(150, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.09);
      o.start(); o.stop(ac.currentTime + 0.10);
    }

    function playWal() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(150, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.2);
      g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
      o.start(); o.stop(ac.currentTime + 0.25);
    }

    function playClear() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(600, ac.currentTime);
      o.frequency.linearRampToValueAtTime(800, ac.currentTime + 0.2);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      o.start(); o.stop(ac.currentTime + 0.28);
    }

    // ── HUD ───────────────────────────────────────────────────
    function updateHud() {
      const r = ROUNDS[currentRound];
      hudScore.textContent = roundScore + ' / ' + r.target;
      hudRoundName.textContent = r.name;
      hudRound.textContent = (currentRound + 1) + ' / ' + ROUNDS.length;

      // color cues
      hudScore.classList.toggle('danger', currentRound >= 3);
      const body = document.body;
      body.classList.remove('hard','insane','master');
      if (currentRound === 2) body.classList.add('hard');
      if (currentRound === 3) body.classList.add('insane');
      if (currentRound === 4) body.classList.add('master');
    }

    // ── retract ───────────────────────────────────────────────
    function retract(podo) {
      clearTimeout(retractTimers.get(podo));
      podo.classList.remove('up', 'patted', 'angry');
    }
    function retractAll() { podos.forEach(retract); }

    // ── impact ring ───────────────────────────────────────────
    function spawnRing(x, y) {
      const el = document.createElement('div');
      el.className = 'ring';
      el.style.cssText = `left:${x}px;top:${y}px;width:0;height:0`;
      document.body.appendChild(el);
      el.animate(
        [{ width:'0px', height:'0px', opacity:1 },
         { width:'60px', height:'60px', opacity:0 }],
        { duration:400, easing:'ease-out', fill:'forwards' }
      );
      setTimeout(() => el.remove(), 450);
    }

    // ── red flash ─────────────────────────────────────────────
    function doRedFlash() {
      redflash.classList.remove('flash');
      void redflash.offsetWidth;
      redflash.classList.add('flash');
      redflash.addEventListener('animationend', () => redflash.classList.remove('flash'), { once:true });
    }

    // ── screen shake ──────────────────────────────────────────
    function doShake() {
      document.body.classList.remove('shake');
      void document.body.offsetWidth;
      document.body.classList.add('shake');
      document.body.addEventListener('animationend', () => document.body.classList.remove('shake'), { once:true });
    }

    // ── splash helper ─────────────────────────────────────────
    function showSplash(main, sub, duration) {
      return new Promise(res => {
        spMain.textContent = main;
        spSub.textContent  = sub || '';
        splash.classList.add('show');
        setTimeout(() => {
          splash.classList.remove('show');
          setTimeout(res, 120);
        }, duration || 500);
      });
    }

    // ── pop one podo ──────────────────────────────────────────
    function popOne() {
      if (!running) return;
      const r = ROUNDS[currentRound];
      const up = podos.filter(p => p.classList.contains('up'));
      const maxUp = Math.floor(r.simultaneous);
      if (up.length >= maxUp + 1) return;   // hard cap = ceil(simultaneous)

      const sleeping = podos.filter(p => !p.classList.contains('up'));
      if (!sleeping.length) return;

      const pick = sleeping[Math.floor(Math.random() * sleeping.length)];
      const isFake = Math.random() < r.fakeRatio;
      pick.src = isFake ? 'podoo.png' : 'podo.png';

      pick.classList.add('up');
      const tid = setTimeout(() => retract(pick), r.stayTime);
      retractTimers.set(pick, tid);
    }

    // ── spawn loop ────────────────────────────────────────────
    function scheduleSpawn() {
      if (!running) return;
      const r = ROUNDS[currentRound];

      // guaranteed count
      const base = Math.floor(r.simultaneous);
      const extra = Math.random() < (r.simultaneous % 1) ? 1 : 0;
      const count = base + extra;
      for (let i = 0; i < count; i++) popOne();

      spawnId = setTimeout(scheduleSpawn, r.spawnInterval);
    }

    // ── round clear ───────────────────────────────────────────
    async function onRoundClear() {
      running = false;
      clearTimeout(spawnId);
      retractAll();
      playClear();

      const isLast = currentRound === ROUNDS.length - 1;
      if (isLast) {
        await showSplash('라운드 클리어!', '', 800);
        gameClear();
        return;
      }

      const nextName = ROUNDS[currentRound + 1].name;
      await showSplash('라운드 클리어!', '다음: ' + nextName, 1500);

      currentRound++;
      roundScore = 0;
      updateHud();
      running = true;
      scheduleSpawn();
    }

    // ── score ─────────────────────────────────────────────────
    function addRoundScore() {
      roundScore++;
      updateHud();
      if (roundScore >= ROUNDS[currentRound].target) {
        onRoundClear();
      }
    }

    // ── game over ─────────────────────────────────────────────
    function gameOver() {
      if (!running) return;
      running = false;
      clearTimeout(spawnId);
      retractAll();
      const r = ROUNDS[currentRound];
      ovTitle.textContent = '끝';
      ovLine1.textContent = (currentRound + 1) + '라운드에서 짭포도에게 당했어요';
      ovLine2.textContent = '라운드 점수: ' + roundScore + ' / ' + r.target;
      overlay.classList.add('show');
    }

    // ── game clear ────────────────────────────────────────────
    function gameClear() {
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      ovTitle.textContent = '🐶 포도 마스터 🐶';
      ovLine1.textContent = '모든 라운드를 깼어요';
      ovLine2.textContent = '총 ' + elapsed + '초 걸렸어요';
      overlay.classList.add('show');
    }

    // ── restart ───────────────────────────────────────────────
    function restart() {
      overlay.classList.remove('show');
      document.body.classList.remove('hard','insane','master');
      currentRound = 0;
      roundScore   = 0;
      updateHud();
      runCountdown();
    }

    overlay.addEventListener('click',   () => { resumeAc(); restart(); });
    overlay.addEventListener('touchend', e => { e.preventDefault(); resumeAc(); restart(); });

    // ── interactions ──────────────────────────────────────────
    podos.forEach(podo => {
      podo.addEventListener('pointerdown', (e) => {
        resumeAc();
        if (!running || !podo.classList.contains('up')) return;
        const rect = podo.getBoundingClientRect();
        const cx = rect.left + rect.width  / 2;
        const cy = rect.top  + rect.height / 2;

        if (podo.src.includes('podoo')) {
          podo.classList.add('angry');
          playWal();
          doRedFlash();
          doShake();
          setTimeout(() => { podo.classList.remove('angry'); retract(podo); gameOver(); }, 300);
        } else {
          playTuk();
          spawnRing(cx, cy);
          podo.classList.add('patted');
          setTimeout(() => retract(podo), 350);
          addRoundScore();
        }
      });
    });

    // ── hand cursor ───────────────────────────────────────────
    document.addEventListener('mousemove', e => {
      hand.style.left = e.clientX + 'px';
      hand.style.top  = e.clientY + 'px';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const isReal = el && el.classList.contains('podo') && el.classList.contains('up') && !el.src.includes('podoo');
      hand.classList.toggle('wiggling', !!isReal);
    });

    // ── countdown then start ──────────────────────────────────
    async function runCountdown() {
      await showSplash('3', '', 500);
      await showSplash('2', '', 500);
      await showSplash('1', '', 500);
      await showSplash('시작!', '', 500);
      startTime = Date.now();
      running = true;
      scheduleSpawn();
    }

    // ── title screen ──────────────────────────────────────────
    titlescreen.addEventListener('click', () => {
      resumeAc();
      titlescreen.classList.add('hidden');
      updateHud();
      runCountdown();
    });
    titlescreen.addEventListener('touchend', e => {
      e.preventDefault();
      resumeAc();
      titlescreen.classList.add('hidden');
      updateHud();
      runCountdown();
    });

    // init HUD without starting
    updateHud();
  </script>

</body>
</html>
