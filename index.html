<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fafafa;
      overflow: hidden;
    }

    #score, #timer {
      position: fixed;
      top: 24px;
      font-family: system-ui, sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #000;
      line-height: 1;
    }
    #score { left: 28px; }
    #timer { right: 28px; }

    #grid {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 160px);
      grid-template-rows: repeat(3, 180px);
      gap: 40px;
    }

    .hole-container {
      position: relative;
      width: 160px;
      height: 180px;
      overflow: hidden;
    }

    .hole {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 160px;
      height: 40px;
      background: #1a1a1a;
      border-radius: 50%;
      box-shadow:
        inset 0 6px 10px rgba(0,0,0,0.6),
        0 2px 0 #111;
    }
  </style>
</head>
<body>

  <div id="score">0</div>
  <div id="timer">60</div>

  <div id="grid">
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
    <div class="hole-container"><div class="hole"></div></div>
  </div>

</body>
</html>
