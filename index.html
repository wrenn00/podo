<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포도 두더지</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }

    body {
      width: 100%; min-height: 100%;
      background: #fafafa;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-weight: 500;
      transition: background 0.6s;
    }

    body.hard   { background: #f0f0f0; }
    body.insane { background: #ececec; }
    body.master { background: #ececec; }

    body.master::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(180,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 1;
    }

    @media (hover: hover) { body { cursor: none; } }

    /* ── hand cursor ── */
    #hand {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 40px;
      line-height: 1;
      transform: translate(-50%, -50%);
      user-select: none;
    }
    #hand.wiggling { animation: hand-wiggle 0.25s ease-in-out infinite alternate; }
    @keyframes hand-wiggle {
      from { transform: translate(-50%,-50%) rotate(-5deg); }
      to   { transform: translate(-50%,-50%) rotate(5deg); }
    }
    @media (hover: none) { #hand { display: none; } }

    /* ── info button ── */
    .info-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-family: 'Pretendard Variable', Pretendard, system-ui, sans-serif;
      letter-spacing: -0.5px;
      transition: transform 0.15s ease;
    }
    .info-btn:hover  { transform: scale(1.05); }
    .info-btn:active { transform: scale(0.95); }

    /* ── rule modal ── */
    .rule-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .rule-modal.show { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: modal-fade 0.2s ease;
    }
    @keyframes modal-fade { from { opacity:0; } to { opacity:1; } }

    .modal-content {
      position: relative;
      background: #fff;
      border-radius: 16px;
      padding: 36px 44px;
      max-width: 440px;
      width: 90%;
      animation: modal-up 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modal-up {
      from { opacity:0; transform: translateY(16px) scale(0.96); }
      to   { opacity:1; transform: translateY(0)     scale(1);    }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      font-size: 15px;
      color: #aaa;
      cursor: pointer;
      font-weight: 600;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: #f0f0f0; color: #000; }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      color: #000;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 13px;
      font-weight: 500;
      color: #999;
      letter-spacing: -0.3px;
      margin-bottom: 28px;
    }
    .modal-rules { display: flex; flex-direction: column; gap: 18px; }
    .modal-rules .rule-item { display: flex; align-items: center; gap: 14px; }
    .modal-rules .rule-podo { width: 68px; height: auto; }
    .modal-rules .rule-icon-wrap {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .modal-rules .rule-text {
      font-size: 15px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.2px;
    }

    /* ── HUD ── */
    #hud-left, #hud-right {
      position: fixed;
      top: 24px;
      line-height: 1;
      pointer-events: none;
      z-index: 10;
    }
    #hud-left  { left: 72px; }   /* shifted right to clear info-btn */
    #hud-right { right: 24px; text-align: right; }

    .hud-num {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      letter-spacing: -1px;
      transition: color 0.3s;
    }
    .hud-num.danger { color: #e03030; }

    .hud-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      margin-top: 4px;
      letter-spacing: 0;
    }

    /* ── grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 240px);
      grid-template-rows: repeat(3, 280px);
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .hole-container {
      position: relative;
      width: 240px;
      height: 280px;
      overflow: hidden;
    }

    .podo {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 240px;
      height: auto;
      transform: translate(-50%, 100%);
      transition: transform 0.2s ease-in;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      z-index: 1;
    }

    .podo.up {
      transform: translate(-50%, 0%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: auto;
    }

    .podo.patted {
      animation: patted 0.35s ease forwards !important;
      pointer-events: none;
    }
    @keyframes patted {
      0%   { transform: translateX(-50%) scale(1, 1); }
      30%  { transform: translateX(-50%) translateY(2%) scale(1.05, 0.92); }
      60%  { transform: translateX(-50%) translateY(-2%) scale(0.97, 1.05); }
      100% { transform: translateX(-50%) scale(1, 1); }
    }

    .podo.angry {
      animation: angry 0.3s ease forwards !important;
      pointer-events: none;
    }
    @keyframes angry {
      0%,100% { transform: translateX(-50%) rotate(0deg); }
      20%     { transform: translateX(-52%) rotate(-3deg); }
      40%     { transform: translateX(-48%) rotate(3deg); }
      60%     { transform: translateX(-52%) rotate(-3deg); }
      80%     { transform: translateX(-48%) rotate(3deg); }
    }

    .hole {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 45px;
      background: #1a1a1a;
      border-radius: 50%;
      box-shadow: inset 0 6px 10px rgba(0,0,0,0.6), 0 2px 0 #111;
      z-index: 2;
      pointer-events: none;
    }

    /* ── screen shake ── */
    @keyframes shake {
      0%   { transform: translate(0,0); }
      18%  { transform: translate(-6px,2px); }
      36%  { transform: translate(5px,-3px); }
      54%  { transform: translate(-4px,3px); }
      72%  { transform: translate(4px,-1px); }
      100% { transform: translate(0,0); }
    }
    body.shake { animation: shake 0.3s ease; }

    /* ── impact ring ── */
    .ring {
      position: fixed;
      border: 1.5px solid rgba(0,0,0,0.14);
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%,-50%);
    }

    /* ── red flash ── */
    #redflash {
      position: fixed;
      inset: 0;
      background: rgba(255,0,0,0.18);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }
    #redflash.flash { animation: redflash-anim 0.2s ease forwards; }
    @keyframes redflash-anim { 0% { opacity:1; } 100% { opacity:0; } }

    /* ── countdown splash ── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.1s;
    }
    #splash.show { opacity: 1; }
    #splash .sp-main {
      font-size: 32px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.5px;
    }

    /* ── round toast ── */
    #roundToast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 14px;
      padding: 22px 28px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.4,0,0.2,1);
      z-index: 150;
    }
    #roundToast.show {
      opacity: 1;
      transform: translate(-50%,-50%) scale(1);
    }
    .toast-rank {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      letter-spacing: -1px;
      line-height: 1;
    }
    .toast-info { display: flex; flex-direction: column; gap: 3px; }
    .toast-status {
      font-size: 14px;
      font-weight: 600;
      color: #000;
      letter-spacing: -0.2px;
    }
    .toast-next {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      letter-spacing: -0.1px;
    }

    /* ── title screen ── */
    #titlescreen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      z-index: 400;
      gap: 72px;
      cursor: pointer;
    }
    #titlescreen.hidden { display: none; }

    .title-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ts-title {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      letter-spacing: -1px;
      line-height: 1;
    }
    .ts-game-type {
      font-size: 14px;
      font-weight: 500;
      color: #999;
      letter-spacing: -0.3px;
      margin-top: 2px;
    }
    .ts-cta {
      margin-top: 36px;
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      letter-spacing: -0.2px;
    }

    /* ── rule guide ── */
    .rule-guide {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .rule-item {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .rule-podo {
      width: 72px;
      height: auto;
      animation: rule-breath 2.8s ease-in-out infinite alternate;
    }

    /* title screen overrides */
    #titlescreen .rule-podo { width: 140px; }
    #titlescreen .rule-icon-wrap { width: 60px; height: 60px; font-size: 32px; }
    #titlescreen .rule-text { font-size: 20px; }
    #titlescreen .rule-item { gap: 20px; }
    @keyframes rule-breath {
      from { transform: scale(1); }
      to   { transform: scale(1.02); }
    }
    .rule-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .rule-icon-wrap.good { background: #000; color: #fff; }
    .rule-icon-wrap.bad  { background: #000; color: #fff; }
    .rule-text {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      letter-spacing: -0.2px;
    }

    /* ── overlay (game over / clear) ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.68);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #overlay.show { display: flex; }
    .ov-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.8px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .ov-line1 {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      line-height: 1.8;
      letter-spacing: -0.2px;
    }
    .ov-line2 {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      line-height: 1.8;
      letter-spacing: -0.1px;
    }

    /* ── insta credit ── */
    .insta-credit {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      pointer-events: none;
      z-index: 9999;
      letter-spacing: -0.1px;
    }

    /* ── responsive ── */
    @media (max-width: 800px), (max-height: 900px) {
      .hole-container { width: 180px; height: 210px; }
      .podo { width: 180px; }
      .hole { width: 135px; height: 35px; }
      #grid {
        grid-template-columns: repeat(3, 180px);
        grid-template-rows: repeat(3, 210px);
        gap: 8px;
      }
    }
    @media (max-width: 600px) {
      .hole-container { width: 130px; height: 155px; }
      .podo { width: 130px; }
      .hole { width: 100px; height: 25px; }
      #grid {
        grid-template-columns: repeat(3, 130px);
        grid-template-rows: repeat(3, 155px);
        gap: 6px;
      }
      #titlescreen { flex-direction: column; gap: 36px; }
      .rule-guide { flex-direction: row; gap: 20px; }
      .rule-podo { width: 56px; }
      .ts-title { font-size: 26px; }
    }
    @media (max-width: 480px) {
      #titlescreen .rule-podo { width: 100px; }
      #titlescreen .rule-icon-wrap { width: 48px; height: 48px; font-size: 26px; }
      #titlescreen .rule-text { font-size: 16px; }
      .hud-num { font-size: 22px; }
      .hud-label { font-size: 10px; }
      .info-btn { width: 30px; height: 30px; font-size: 13px; top: 16px; left: 16px; }
      #hud-left { top: 16px; left: 56px; }
      #hud-right { top: 16px; right: 16px; }
      .modal-content { padding: 28px 20px; }
      .modal-title { font-size: 20px; }
      .modal-rules .rule-podo { width: 54px; }
      .modal-rules .rule-icon-wrap { width: 32px; height: 32px; font-size: 15px; }
      #roundToast { padding: 16px 22px; }
      .toast-rank { font-size: 26px; }
      .toast-status { font-size: 13px; }
      .toast-next { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="insta-credit">@my_name_is_podo_</div>

  <button class="info-btn" id="infoBtn" aria-label="게임 룰 보기">ⓘ</button>

  <div class="rule-modal" id="ruleModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-title">포도 북북 게임</div>
      <div class="modal-subtitle">두더지 게임</div>
      <div class="modal-rules">
        <div class="rule-item">
          <img src="podo.png" class="rule-podo" draggable="false">
          <div class="rule-icon-wrap">🫳</div>
          <span class="rule-text">+1</span>
        </div>
        <div class="rule-item">
          <img src="podoo.png" class="rule-podo" draggable="false">
          <div class="rule-icon-wrap">❌</div>
          <span class="rule-text">게임 오버</span>
        </div>
      </div>
    </div>
  </div>

  <div id="redflash"></div>
  <div id="splash"><span class="sp-main" id="spMain"></span></div>
  <div id="hand">🫳</div>

  <div id="hud-left">
    <div class="hud-num" id="hudScore">0/15</div>
    <div class="hud-label" id="hudRoundName">쉬움</div>
  </div>
  <div id="hud-right">
    <div class="hud-num" id="hudRound">1/5</div>
    <div class="hud-label">라운드</div>
  </div>

  <div id="roundToast">
    <div class="toast-rank" id="toastRank">1</div>
    <div class="toast-info">
      <div class="toast-status">완료</div>
      <div class="toast-next" id="toastNext">다음 · 보통</div>
    </div>
  </div>

  <div id="overlay">
    <div class="ov-title" id="ovTitle">끝</div>
    <div class="ov-line1" id="ovLine1"></div>
    <div class="ov-line2" id="ovLine2"></div>
  </div>

  <div id="titlescreen">
    <div class="rule-guide">
      <div class="rule-item">
        <img src="podo.png" class="rule-podo" draggable="false">
        <div class="rule-icon-wrap good">🫳</div>
        <span class="rule-text">+1</span>
      </div>
      <div class="rule-item">
        <img src="podoo.png" class="rule-podo" draggable="false">
        <div class="rule-icon-wrap bad">❌</div>
        <span class="rule-text">게임 오버</span>
      </div>
    </div>
    <div class="title-section">
      <div class="ts-title">포도 북북 게임</div>
      <div class="ts-game-type">두더지 게임</div>
      <div class="ts-cta">탭해서 시작</div>
    </div>
  </div>

  <div id="grid">
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
    <div class="hole-container"><img class="podo" src="podo.png" draggable="false"><div class="hole"></div></div>
  </div>

  <script>
    const ROUNDS = [
      { name: '쉬움',        target: 15, spawnInterval: 1000, stayTime: 1400, fakeRatio: 0.15, simultaneous: 1   },
      { name: '보통',        target: 20, spawnInterval: 800,  stayTime: 1100, fakeRatio: 0.25, simultaneous: 1.3 },
      { name: '어려움',      target: 25, spawnInterval: 600,  stayTime: 900,  fakeRatio: 0.30, simultaneous: 2   },
      { name: '미친',        target: 30, spawnInterval: 450,  stayTime: 700,  fakeRatio: 0.35, simultaneous: 2.5 },
      { name: '포도 마스터', target: 35, spawnInterval: 300,  stayTime: 500,  fakeRatio: 0.40, simultaneous: 3   },
    ];

    const podos        = Array.from(document.querySelectorAll('.podo'));
    const hand         = document.getElementById('hand');
    const redflash     = document.getElementById('redflash');
    const splash       = document.getElementById('splash');
    const spMain       = document.getElementById('spMain');
    const hudScore     = document.getElementById('hudScore');
    const hudRoundName = document.getElementById('hudRoundName');
    const hudRound     = document.getElementById('hudRound');
    const overlay      = document.getElementById('overlay');
    const ovTitle      = document.getElementById('ovTitle');
    const ovLine1      = document.getElementById('ovLine1');
    const ovLine2      = document.getElementById('ovLine2');
    const titlescreen  = document.getElementById('titlescreen');
    const roundToast   = document.getElementById('roundToast');
    const toastRank    = document.getElementById('toastRank');
    const toastNext    = document.getElementById('toastNext');
    const infoBtn      = document.getElementById('infoBtn');
    const ruleModal    = document.getElementById('ruleModal');
    const modalClose   = document.getElementById('modalClose');
    const modalBackdrop= document.getElementById('modalBackdrop');

    let currentRound = 0;
    let roundScore   = 0;
    let running      = false;
    let paused       = false;
    let spawnId      = null;
    let startTime    = 0;
    const retractTimers = new WeakMap();
    const occupied = new Array(podos.length).fill(false);

    // ── info btn visibility ───────────────────────────────────
    function showInfoBtn() { infoBtn.style.display = 'flex'; }
    function hideInfoBtn() { infoBtn.style.display = 'none'; }

    // ── rule modal ────────────────────────────────────────────
    function openModal() {
      ruleModal.classList.add('show');
      paused = true;
    }
    function closeModal() {
      ruleModal.classList.remove('show');
      paused = false;
    }
    infoBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && ruleModal.classList.contains('show')) closeModal();
    });

    // ── audio ─────────────────────────────────────────────────
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    function resumeAc() { if (ac.state === 'suspended') ac.resume(); }

    function playTuk() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(150, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.08);
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.09);
      o.start(); o.stop(ac.currentTime + 0.10);
    }

    function playWal() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(150, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(50, ac.currentTime + 0.2);
      g.gain.setValueAtTime(0.3, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.22);
      o.start(); o.stop(ac.currentTime + 0.25);
    }

    function playClear() {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(600, ac.currentTime);
      o.frequency.linearRampToValueAtTime(800, ac.currentTime + 0.2);
      g.gain.setValueAtTime(0.2, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      o.start(); o.stop(ac.currentTime + 0.28);
    }

    // ── HUD ───────────────────────────────────────────────────
    function updateHud() {
      const r = ROUNDS[currentRound];
      hudScore.textContent = roundScore + '/' + r.target;
      hudRoundName.textContent = r.name;
      hudRound.textContent = (currentRound + 1) + '/' + ROUNDS.length;
      hudScore.classList.toggle('danger', currentRound >= 3);
      const b = document.body;
      b.classList.remove('hard','insane','master');
      if (currentRound === 2) b.classList.add('hard');
      if (currentRound === 3) b.classList.add('insane');
      if (currentRound === 4) b.classList.add('master');
    }

    // ── retract ───────────────────────────────────────────────
    function retract(podo) {
      clearTimeout(retractTimers.get(podo));
      podo.classList.remove('up','patted','angry');
      const idx = podos.indexOf(podo);
      if (idx !== -1) setTimeout(() => { occupied[idx] = false; }, 250);
    }
    function retractAll() {
      podos.forEach(retract);
      setTimeout(() => occupied.fill(false), 300);
    }

    // ── impact ring ───────────────────────────────────────────
    function spawnRing(x, y) {
      const el = document.createElement('div');
      el.className = 'ring';
      el.style.cssText = `left:${x}px;top:${y}px;width:0;height:0`;
      document.body.appendChild(el);
      el.animate(
        [{ width:'0px', height:'0px', opacity:1 },
         { width:'60px', height:'60px', opacity:0 }],
        { duration:400, easing:'ease-out', fill:'forwards' }
      );
      setTimeout(() => el.remove(), 450);
    }

    // ── red flash ─────────────────────────────────────────────
    function doRedFlash() {
      redflash.classList.remove('flash');
      void redflash.offsetWidth;
      redflash.classList.add('flash');
      redflash.addEventListener('animationend', () => redflash.classList.remove('flash'), { once:true });
    }

    // ── screen shake ──────────────────────────────────────────
    function doShake() {
      document.body.classList.remove('shake');
      void document.body.offsetWidth;
      document.body.classList.add('shake');
      document.body.addEventListener('animationend', () => document.body.classList.remove('shake'), { once:true });
    }

    // ── countdown splash ──────────────────────────────────────
    function showSplash(text, duration) {
      return new Promise(res => {
        spMain.textContent = text;
        splash.classList.add('show');
        setTimeout(() => {
          splash.classList.remove('show');
          setTimeout(res, 100);
        }, duration || 500);
      });
    }

    // ── round toast ───────────────────────────────────────────
    function showRoundToast(roundNum, nextName) {
      return new Promise(res => {
        toastRank.textContent = roundNum;
        toastNext.textContent = nextName ? '다음 · ' + nextName : '마지막';
        roundToast.classList.add('show');
        setTimeout(() => {
          roundToast.classList.remove('show');
          setTimeout(res, 270);
        }, 1400);
      });
    }

    // ── pop one podo ──────────────────────────────────────────
    function popOne() {
      if (!running) return;
      const r = ROUNDS[currentRound];
      const free = podos.map((_,i) => i).filter(i => !occupied[i]);
      if (!free.length) return;
      const idx = free[Math.floor(Math.random() * free.length)];
      occupied[idx] = true;
      const podo = podos[idx];
      const isFake = Math.random() < r.fakeRatio;
      podo.src = isFake ? 'podoo.png' : 'podo.png';
      podo.dataset.fake = isFake ? '1' : '0';
      podo.classList.add('up');
      const tid = setTimeout(() => retract(podo), r.stayTime);
      retractTimers.set(podo, tid);
    }

    // ── spawn loop ────────────────────────────────────────────
    function scheduleSpawn() {
      if (!running) return;
      const r = ROUNDS[currentRound];
      const base  = Math.floor(r.simultaneous);
      const extra = Math.random() < (r.simultaneous % 1) ? 1 : 0;
      for (let i = 0; i < base + extra; i++) popOne();
      spawnId = setTimeout(scheduleSpawn, r.spawnInterval);
    }

    // ── round clear ───────────────────────────────────────────
    async function onRoundClear() {
      running = false;
      clearTimeout(spawnId);
      retractAll();
      playClear();

      const isLast = currentRound === ROUNDS.length - 1;
      const nextName = isLast ? null : ROUNDS[currentRound + 1].name;
      await showRoundToast(currentRound + 1, nextName);

      if (isLast) { gameClear(); return; }

      currentRound++;
      roundScore = 0;
      updateHud();
      running = true;
      scheduleSpawn();
    }

    // ── score ─────────────────────────────────────────────────
    function addRoundScore() {
      roundScore++;
      updateHud();
      if (roundScore >= ROUNDS[currentRound].target) onRoundClear();
    }

    // ── game over ─────────────────────────────────────────────
    function gameOver() {
      if (!running) return;
      running = false;
      clearTimeout(spawnId);
      retractAll();
      hideInfoBtn();
      const r = ROUNDS[currentRound];
      ovTitle.textContent = '끝';
      ovLine1.textContent = (currentRound + 1) + '라운드 · 짭포도';
      ovLine2.textContent = roundScore + ' / ' + r.target;
      overlay.classList.add('show');
    }

    // ── game clear ────────────────────────────────────────────
    function gameClear() {
      hideInfoBtn();
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      ovTitle.textContent = '포도 마스터';
      ovLine1.textContent = '모든 라운드 완료';
      ovLine2.textContent = elapsed + '초';
      overlay.classList.add('show');
    }

    // ── restart ───────────────────────────────────────────────
    function restart() {
      overlay.classList.remove('show');
      document.body.classList.remove('hard','insane','master');
      currentRound = 0;
      roundScore   = 0;
      occupied.fill(false);
      updateHud();
      runCountdown();
    }

    overlay.addEventListener('click',    () => { resumeAc(); restart(); });
    overlay.addEventListener('touchend',  e  => { e.preventDefault(); resumeAc(); restart(); });

    // ── interactions ──────────────────────────────────────────
    podos.forEach(podo => {
      podo.addEventListener('pointerdown', () => {
        resumeAc();
        if (!running || paused || !podo.classList.contains('up')) return;
        const rect = podo.getBoundingClientRect();
        const cx = rect.left + rect.width  / 2;
        const cy = rect.top  + rect.height / 2;

        if (podo.src.includes('podoo')) {
          podo.classList.add('angry');
          playWal();
          doRedFlash();
          doShake();
          setTimeout(() => { podo.classList.remove('angry'); retract(podo); gameOver(); }, 300);
        } else {
          playTuk();
          spawnRing(cx, cy);
          podo.classList.add('patted');
          setTimeout(() => retract(podo), 350);
          addRoundScore();
        }
      });
    });

    // ── hand cursor ───────────────────────────────────────────
    document.addEventListener('mousemove', e => {
      hand.style.left = e.clientX + 'px';
      hand.style.top  = e.clientY + 'px';
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const isReal = el && el.classList.contains('podo') && el.classList.contains('up') && !el.src.includes('podoo');
      hand.classList.toggle('wiggling', !!isReal);
    });

    // ── countdown ─────────────────────────────────────────────
    async function runCountdown() {
      await showSplash('3', 500);
      await showSplash('2', 500);
      await showSplash('1', 500);
      await showSplash('시작', 400);
      startTime = Date.now();
      running = true;
      showInfoBtn();
      scheduleSpawn();
    }

    // ── title screen ──────────────────────────────────────────
    function startFromTitle() {
      resumeAc();
      titlescreen.classList.add('hidden');
      updateHud();
      runCountdown();
    }
    titlescreen.addEventListener('click',    startFromTitle);
    titlescreen.addEventListener('touchend', e => { e.preventDefault(); startFromTitle(); });

    updateHud();
  </script>

</body>
</html>
